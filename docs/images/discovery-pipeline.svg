<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img"
     aria-labelledby="title desc">
  <title id="title">Candidate discovery path</title>
  <desc id="desc">Host vocab to Invent and Expand to Scenario to Script to Sealed</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="inv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="exp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="960" height="220" rx="16" fill="url(#bg)"/>
  <text x="40" y="36" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif"
        font-size="18" font-weight="700">Candidate discovery path</text>
  <text x="40" y="56" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif"
        font-size="11">Same tracker contract as Prose → Draft IR → Staffed IR → Compile/save</text>

  <!-- Stage cards -->
  <!-- Vocab -->
  <g filter="url(#soft)">
    <rect x="28" y="80" width="120" height="88" rx="10" fill="#1e293b" stroke="#475569"/>
    <text x="88" y="108" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif"
          font-size="13" font-weight="700">Host vocab</text>
    <text x="88" y="128" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif"
          font-size="10">kinds · surfaces</text>
    <text x="88" y="144" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif"
          font-size="10">· stealers</text>
  </g>

  <!-- arrow -->
  <path d="M156 124 H178" stroke="#64748b" stroke-width="2" fill="none"
        marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Invent (highlight) -->
  <g filter="url(#soft)">
    <rect x="186" y="80" width="120" height="88" rx="10" fill="url(#inv)" stroke="#a5b4fc"/>
    <text x="246" y="108" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif"
          font-size="13" font-weight="700">● Invent</text>
    <text x="246" y="128" text-anchor="middle" fill="#e0e7ff" font-family="system-ui,sans-serif"
          font-size="10">surface × act</text>
    <text x="246" y="144" text-anchor="middle" fill="#e0e7ff" font-family="system-ui,sans-serif"
          font-size="10">× stealer</text>
  </g>

  <!-- Expand -->
  <g filter="url(#soft)">
    <rect x="344" y="80" width="120" height="88" rx="10" fill="url(#exp)" stroke="#7dd3fc"/>
    <text x="404" y="108" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif"
          font-size="13" font-weight="700">Expand</text>
    <text x="404" y="128" text-anchor="middle" fill="#e0f2fe" font-family="system-ui,sans-serif"
          font-size="10">kind × foreign</text>
    <text x="404" y="144" text-anchor="middle" fill="#e0f2fe" font-family="system-ui,sans-serif"
          font-size="10">leaf · matrix</text>
  </g>

  <!-- arrows invent/expand from vocab (parallel-ish linear) -->
  <path d="M314 124 H336" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M472 124 H494" stroke="#64748b" stroke-width="2" fill="none"/>

  <!-- Scenario -->
  <g filter="url(#soft)">
    <rect x="502" y="80" width="120" height="88" rx="10" fill="#1e293b" stroke="#475569"/>
    <text x="562" y="108" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif"
          font-size="13" font-weight="700">Scenario</text>
    <text x="562" y="128" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif"
          font-size="10">candidate YAML</text>
    <text x="562" y="144" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif"
          font-size="10">review in console</text>
  </g>

  <path d="M630 124 H652" stroke="#64748b" stroke-width="2" fill="none"/>

  <!-- Script -->
  <g filter="url(#soft)">
    <rect x="660" y="80" width="120" height="88" rx="10" fill="#1e293b" stroke="#475569"/>
    <text x="720" y="108" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif"
          font-size="13" font-weight="700">Script</text>
    <text x="720" y="128" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif"
          font-size="10">CI golden</text>
    <text x="720" y="144" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif"
          font-size="10">pins · invariants</text>
  </g>

  <path d="M788 124 H810" stroke="#64748b" stroke-width="2" fill="none"/>

  <!-- Sealed -->
  <g filter="url(#soft)">
    <rect x="818" y="80" width="120" height="88" rx="10" fill="url(#seal)" stroke="#86efac"/>
    <text x="878" y="108" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif"
          font-size="13" font-weight="700">Sealed</text>
    <text x="878" y="128" text-anchor="middle" fill="#dcfce7" font-family="system-ui,sans-serif"
          font-size="10">pattern catalog</text>
    <text x="878" y="144" text-anchor="middle" fill="#dcfce7" font-family="system-ui,sans-serif"
          font-size="10">forever regression</text>
  </g>

  <text x="40" y="200" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">
    Invent first · Expand second · Optional LLM propose feeds Invent only (code law + physics backcheck)
  </text>
</svg>
